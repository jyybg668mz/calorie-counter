<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Calorie Counter</title>
  <meta name="theme-color" content="#1e1b2e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nada" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <button id="friendsBtn" class="corner-btn" aria-label="Friends">&#128101;</button>
    <div class="date-nav">
      <button id="prevDay" class="ghost-btn" aria-label="Previous day">‹</button>
      <div class="date-label" id="dateLabel">Today</div>
      <button id="nextDay" class="ghost-btn" aria-label="Next day">›</button>
    </div>
    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 120 120" aria-hidden="true">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fb7185" />
            <stop offset="100%" stop-color="#f97316" />
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="60" cy="60" r="54" />
        <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="54" />
      </svg>
      <div class="ring-center">
        <span class="total-num" id="totalKcal">0</span>
        <span class="total-goal" id="totalGoal">of 2,000 kcal</span>
      </div>
    </div>
  </header>

  <main id="entryList" class="entry-list">
    <!-- entries injected here -->
  </main>

  <button id="addBtn" class="add-btn" aria-label="Add food">+</button>

  <!-- Search overlay -->
  <div id="searchOverlay" class="overlay hidden">
    <div class="overlay-head">
      <input id="searchInput" type="search" inputmode="search" placeholder="Search a food…" autocomplete="off" />
      <button id="closeSearch" class="ghost-btn" aria-label="Close">✕</button>
    </div>
    <div id="searchStatus" class="search-status"></div>
    <div id="searchResults" class="results"></div>
  </div>

  <!-- Friends / accountability overlay -->
  <div id="friendsOverlay" class="overlay hidden">
    <div class="overlay-head">
      <div class="overlay-title">Accountability</div>
      <button id="closeFriends" class="ghost-btn" aria-label="Close">&#10005;</button>
    </div>
    <div id="friendsBody" class="friends-body"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
